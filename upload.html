<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка - SWAG SOUND</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">SWAG SOUND</a>
        <ul>
            <li><a href="index.html">Главная</a></li>
            <li><a href="profile.html">Профиль</a></li>
            <li><a href="login.html">Войти</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 500px; margin: 50px auto;">
        <h2>Выгрузка трека</h2>
        <form id="uploadForm">
            <label>Название трека:</label>
            <input type="text" id="trackName" placeholder="Например: Neon Nights..." required>
            
            <label style="display: block; margin-top: 15px;">Аудиофайл (MP3/WAV):</label>
            <input type="file" id="audioFile" accept="audio/mp3,audio/wav" required>
            
            <button type="submit">Загрузить в сеть</button>
        </form>
    </div>

    <!-- Подключаем скрипт как модуль -->
    <script type="module" src="app.js"></script>
</body>
</html>
