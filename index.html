<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SWAG SOUND</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Верх с Логотипом и Поиском -->
    <header class="top-header">
        <a href="index.html" class="logo">SWAG SOUND</a>
        <input type="text" id="searchInput" placeholder="Поиск треков или артистов..." class="search-bar">
    </header>

    <!-- Главная лента (теперь вертикальная) -->
    <div class="container">
        <h2>Лента</h2>
        <div class="feed" id="recommendations">
            <!-- Здесь пусто. Карточки появятся плавно из базы данных -->
            <p id="loadingMsg" style="text-align: center; color: #888;">Загрузка свежего свэга...</p>
        </div>
    </div>

    <!-- Нижняя панель управления -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">Главная</a>
        
        <!-- Центральная кнопка профиля -->
        <a href="login.html" class="nav-item nav-profile" id="bottomNavProfile">
            <img id="navAvatar" src="" alt="" style="display: none;">
            <div id="navAvatarPlaceholder" style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; font-size: 24px;">?</div>
            <span id="navName">Войти</span>
        </a>

        <a href="upload.html" class="nav-item">Загрузить</a>
    </nav>

    <script type="module" src="app.js"></script>

</html>
